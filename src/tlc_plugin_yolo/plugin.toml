# 3LC Compute plugin manifest — the single source of truth for this plugin's
# metadata. The host loads the plugin via runtime.entrypoint; there is no
# register() call at import and no metadata on the plugin class.
id = "yolo"
name = "YOLO"
description = "Fine-tune YOLO models on your data with live metrics, SocketIO progress, and experiment tracking."
version = "1.0.0"
min_service_version = "0.1.0"
icon = "◈"
icon_svg = '<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="10" height="10" rx="1"/><rect x="5" y="5" width="6" height="6" rx="0.5" stroke-dasharray="2 1"/></svg>'

[ui]
display_mode = "sidebar"
section = "AI Tools"
compatible_with = ["table"]
input_types = ["table", "table"]
output_types = ["run"]
min_input_count = 1
action_param_names = ["train", "val"]
quick_action = true
quick_action_label = "Train a YOLO Model"
quick_action_description = "Fine-tune a YOLO model on your data with live metrics"

[runtime]
isolation = "venv"
entrypoint = "tlc_plugin_yolo:YoloPlugin"
# Heavy stack lives behind this extra of the providing distribution; the host
# installs it ONLY into this plugin's provisioned venv, never the host venv.
provision_extra = "yolo"
requires_gpu = true
training = true
